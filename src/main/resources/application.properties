spring.application.name=electrocorp-platform

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/electrocorp_db}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.naming.physical-strategy=com.electrocorp.electrocorpplatform.shared.infrastructure.persistence.jpa.strategy.SnakeCasePhysicalNamingStrategy

spring.jackson.time-zone=America/Lima

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
