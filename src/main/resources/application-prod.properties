server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD}}

# En esta version academica, produccion usa ddl-auto=update para permitir
# bootstrap automatico del esquema en Render. Las migraciones formales con
# Flyway/Liquibase quedan como mejora posterior.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

electrocorp.security.jwt.secret=${JWT_SECRET}
electrocorp.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
